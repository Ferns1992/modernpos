services:
  modern-pos:
    image: node:22-alpine
    container_name: modern-pos
    ports:
      - "4000:4000"
    volumes:
      - ./data:/data
    environment:
      - NODE_ENV=production
      - DATABASE_PATH=/data/pos.db
    command: >
      sh -c "npm install -g serve && serve -s dist -p 4000"
    restart: unless-stopped