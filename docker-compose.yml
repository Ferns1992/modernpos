services:
  pos-app:
    image: pos-app:latest
    ports:
      - target: 4000
        published: 4000
        protocol: tcp
        mode: host
    volumes:
      - /data/pos.db:/data/pos.db
    environment:
      - NODE_ENV=production
    deploy:
      restart_policy:
        condition: on-failure
      placement:
        constraints: [node.role == manager]
