version: '3.8'
services:
  modern-pos:
    build: .
    image: ferns1992/modernpos:latest
    container_name: modern-pos
    ports:
      - "4000:4000"
    volumes:
      - data:/data
    environment:
      - NODE_ENV=production
      - DATABASE_PATH=/data/pos.db
    restart: unless-stopped

volumes:
  data:
