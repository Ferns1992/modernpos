version: "3.3"
services:
  modern-pos:
    build:
      context: .
      dockerfile: Dockerfile
      no_cache: true
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - DATABASE_PATH=/data/pos.db
    restart: unless-stopped
    volumes:
      - pos-data:/data

volumes:
  pos-data: